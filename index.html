<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danil Tushkov | OSINT & Dev Terminal</title>
    <style>
        /* === RESET & VARIABLES === */
        :root {
            --bg-main: #09090b;
            --bg-panel: #18181b;
            --bg-hover: #27272a;
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #3f3f46;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "JetBrains Mono", "Courier New", Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* === TYPOGRAPHY & UTILS === */
        h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; }
        .mono { font-family: var(--font-mono); }
        .text-muted { color: var(--text-muted); font-size: 0.875rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }

        /* === LAYOUT === */
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        
        /* === HEADER === */
        .header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .profile-wrap { display: flex; align-items: center; gap: 12px; }
        .avatar-container {
            width: 48px; height: 48px;
            border-radius: 8px;
            background-color: var(--bg-hover);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .avatar-container img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .avatar-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.6); color: white;
            font-size: 10px; text-align: center; padding: 2px 0;
            opacity: 0; transition: opacity 0.2s;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        #avatar-input { display: none; }
        
        /* === TABS === */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* === CARDS === */
        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--text-main); }
        .icon-svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* === STATS GRID === */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-box { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-value { font-size: 1.25rem; font-weight: 600; font-family: var(--font-mono); }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        .trend-indicator { font-size: 0.75rem; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

        /* === FORMS & BUTTONS === */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 4px; }
        input, select {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent); }
        
        .btn {
            background: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }

        /* === TRANSACTION LIST === */
        .tx-list { margin-top: 16px; }
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .tx-item:last-child { border-bottom: none; }
        .tx-info h4 { font-size: 0.875rem; margin-bottom: 2px; }
        .tx-info p { font-size: 0.75rem; color: var(--text-muted); }
        .tx-amount { font-family: var(--font-mono); font-weight: 600; font-size: 0.875rem; }
        .tx-income { color: var(--success); }
        .tx-expense { color: var(--text-main); }
        .tx-delete { background: none; border: none; color: var(--danger); cursor: pointer; padding: 4px; opacity: 0.7; }

        /* === BOTTOM NAV === */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-muted); background: none; border: none; cursor: pointer;
            flex: 1; font-size: 0.75rem; transition: color 0.2s;
        }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item.active { color: var(--accent); }

        /* === TOAST NOTIFICATION === */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent); color: white; padding: 10px 20px;
            border-radius: 8px; font-size: 0.875rem; font-weight: 500;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; box-shadow: 0 10px 25px -5px rgba(168, 85, 247, 0.5);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast">Действие выполнено</div>

    <header class="header">
        <div class="flex justify-between items-center">
            <div class="profile-wrap">
                <label class="avatar-container" for="avatar-input">
                    <img id="profile-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='%233f3f46' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'></path><circle cx='12' cy='7' r='4'></circle></svg>" alt="Avatar">
                    <div class="avatar-overlay">EDIT</div>
                </label>
                <input type="file" id="avatar-input" accept="image/*">
                <div>
                    <h2 style="font-size: 1rem;">Danil Tushkov</h2>
                    <p class="text-muted mono" id="header-time">00:00:00</p>
                </div>
            </div>
            <div class="mono" style="color: var(--accent); font-size: 0.875rem; font-weight: bold;">SYS_ACTIVE</div>
        </div>
    </header>

    <div class="container">
        
        <main id="tab-dashboard" class="tab-content active">
            
            <div class="card">
                <div class="card-header">
                    <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    <span class="card-title">Market Live (UZS)</span>
                </div>
                <div class="stats-grid" id="market-grid">
                    <div class="stat-box"><div class="stat-label">Загрузка...</div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    <span class="card-title">Crypto Portfolio</span>
                </div>
                <div style="margin-bottom: 16px;">
                    <div class="text-muted" style="font-size: 0.75rem; margin-bottom: 4px;">TOTAL VALUE</div>
                    <div class="mono" style="font-size: 1.75rem; font-weight: bold; color: var(--accent);" id="portfolio-total">0 UZS</div>
                </div>
                
                <div class="stats-grid" style="margin-bottom: 16px;">
                    <div class="form-group">
                        <label>Мои TON</label>
                        <input type="number" id="own-ton" placeholder="0.0" oninput="savePortfolio()">
                    </div>
                    <div class="form-group">
                        <label>Мои BTC</label>
                        <input type="number" id="own-btc" placeholder="0.0" oninput="savePortfolio()">
                    </div>
                </div>
            </div>
        </main>

        <main id="tab-finance" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                    <span class="card-title">Ledger Balance</span>
                </div>
                <div class="mono" style="font-size: 2rem; font-weight: bold; text-align: center; margin: 10px 0 20px;" id="finance-total">0 UZS</div>
                
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button class="btn btn-primary" onclick="toggleTxForm('income')" style="background: var(--success); border-color: var(--success);">
                        <svg class="icon-svg" style="width:16px;height:16px;" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg> Ввод
                    </button>
                    <button class="btn" onclick="toggleTxForm('expense')">
                        <svg class="icon-svg" style="width:16px;height:16px;" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg> Вывод
                    </button>
                </div>

                <div id="tx-form" style="display: none; background: var(--bg-main); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px;">
                    <input type="hidden" id="tx-type">
                    <div class="form-group">
                        <label>Сумма (UZS)</label>
                        <input type="number" id="tx-amount" placeholder="50000">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <input type="text" id="tx-desc" placeholder="Перевод / Покупка">
                    </div>
                    <button class="btn btn-primary" onclick="addTransaction()">Подтвердить</button>
                </div>

                <div class="text-muted" style="font-size: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 8px;">ИСТОРИЯ ОПЕРАЦИЙ</div>
                <div class="tx-list" id="tx-list">
                    </div>
            </div>
        </main>

        <main id="tab-settings" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    <span class="card-title">System Status</span>
                </div>
                <div class="tx-list">
                    <div class="tx-item">
                        <div class="tx-info"><h4>User Role</h4><p>Main Tester (Rank 4)</p></div>
                        <div class="mono text-muted">Active</div>
                    </div>
                    <div class="tx-item">
                        <div class="tx-info"><h4>Local Storage</h4><p>Browser Memory</p></div>
                        <div class="mono text-muted" id="storage-status">OK</div>
                    </div>
                    <div class="tx-item">
                        <div class="tx-info"><h4>Device Sync</h4><p>Pydroid / Web</p></div>
                        <div class="mono" style="color: var(--success);">Online</div>
                    </div>
                </div>
            </div>
            
            <button class="btn" style="color: var(--danger); border-color: var(--danger);" onclick="clearAllData()">
                <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Сбросить базу данных
            </button>
        </main>

    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('dashboard')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Overview</span>
        </button>
        <button class="nav-item" onclick="switchTab('finance')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>
            <span>Ledger</span>
        </button>
        <button class="nav-item" onclick="switchTab('settings')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>System</span>
        </button>
    </nav>

    <script>
        // === CORE SYSTEM ===
        let currentRates = { usd: 0, ton: 0, btc: 0 };
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('header-time').innerText = now.toTimeString().split(' ')[0];
        }, 1000);

        // === AVATAR SYSTEM ===
        const avatarInput = document.getElementById('avatar-input');
        const profileImg = document.getElementById('profile-img');
        
        // Load saved avatar
        if(localStorage.getItem('sys_avatar')) {
            profileImg.src = localStorage.getItem('sys_avatar');
        }

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Str = event.target.result;
                    profileImg.src = base64Str;
                    try {
                        localStorage.setItem('sys_avatar', base64Str);
                        showToast("Аватар обновлен");
                    } catch (e) {
                        showToast("Файл слишком большой для памяти");
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // === API & MARKET LOGIC ===
        async function fetchMarketData() {
            try {
                // Get USD to UZS rate
                const cbuRes = await fetch("https://cbu.uz/ru/arkhiv-kursov-valyut/json/");
                const cbuData = await cbuRes.json();
                currentRates.usd = parseFloat(cbuData.find(c => c.Ccy === 'USD').Rate);

                // Get Crypto data
                const cgRes = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=the-open-network,bitcoin&vs_currencies=usd&include_24hr_change=true");
                const cgData = await cgRes.json();
                
                currentRates.ton = cgData['the-open-network'].usd * currentRates.usd;
                currentRates.btc = cgData.bitcoin.usd * currentRates.usd;

                renderMarketGrid([
                    { label: 'USD', val: currentRates.usd, change: 0 },
                    { label: 'TON', val: currentRates.ton, change: cgData['the-open-network'].usd_24h_change },
                    { label: 'BTC', val: currentRates.btc, change: cgData.bitcoin.usd_24h_change }
                ]);
                
                calculatePortfolio();
            } catch (err) {
                console.error(err);
                document.getElementById('market-grid').innerHTML = "<div class='text-muted'>Ошибка соединения с API</div>";
            }
        }

        function renderMarketGrid(assets) {
            const html = assets.map(a => {
                const isUp = a.change >= 0;
                const trendClass = isUp ? 'trend-up' : 'trend-down';
                const trendIcon = isUp ? '▲' : '▼';
                const changeHtml = a.change !== 0 ? `<div class="trend-indicator ${trendClass}">${trendIcon} ${Math.abs(a.change).toFixed(2)}%</div>` : '';
                
                return `
                <div class="stat-box">
                    <div class="stat-label">${a.label} / UZS</div>
                    <div class="stat-value">${Math.floor(a.val).toLocaleString('ru-RU')}</div>
                    ${changeHtml}
                </div>`;
            }).join('');
            document.getElementById('market-grid').innerHTML = html;
        }

        // === PORTFOLIO CALCULATOR ===
        function loadPortfolioInput() {
            const p = JSON.parse(localStorage.getItem('sys_portfolio') || '{"ton":0, "btc":0}');
            document.getElementById('own-ton').value = p.ton || '';
            document.getElementById('own-btc').value = p.btc || '';
        }

        function savePortfolio() {
            const ton = parseFloat(document.getElementById('own-ton').value) || 0;
            const btc = parseFloat(document.getElementById('own-btc').value) || 0;
            localStorage.setItem('sys_portfolio', JSON.stringify({ton, btc}));
            calculatePortfolio();
        }

        function calculatePortfolio() {
            const p = JSON.parse(localStorage.getItem('sys_portfolio') || '{"ton":0, "btc":0}');
            const total = (p.ton * currentRates.ton) + (p.btc * currentRates.btc);
            document.getElementById('portfolio-total').innerText = Math.floor(total).toLocaleString('ru-RU') + " UZS";
        }

        // === LOCAL FINANCE MANAGER ===
        let transactions = JSON.parse(localStorage.getItem('sys_ledger') || '[]');

        function toggleTxForm(type) {
            const form = document.getElementById('tx-form');
            document.getElementById('tx-type').value = type;
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function addTransaction() {
            const amount = parseInt(document.getElementById('tx-amount').value);
            const desc = document.getElementById('tx-desc').value || 'Без описания';
            const type = document.getElementById('tx-type').value;

            if(!amount || amount <= 0) {
                showToast("Введите корректную сумму");
                return;
            }

            const tx = {
                id: Date.now(),
                amount: amount,
                desc: desc,
                type: type,
                date: new Date().toLocaleDateString('ru-RU')
            };

            transactions.unshift(tx);
            saveTransactions();
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-desc').value = '';
            document.getElementById('tx-form').style.display = 'none';
            showToast("Запись добавлена");
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions();
            showToast("Запись удалена");
        }

        function saveTransactions() {
            localStorage.setItem('sys_ledger', JSON.stringify(transactions));
            renderTransactions();
        }

        function renderTransactions() {
            const list = document.getElementById('tx-list');
            let balance = 0;
            let html = '';

            if (transactions.length === 0) {
                html = '<div class="text-muted" style="text-align:center; padding: 20px 0;">Нет записей</div>';
            } else {
                transactions.forEach(t => {
                    const isInc = t.type === 'income';
                    balance += isInc ? t.amount : -t.amount;
                    const sign = isInc ? '+' : '-';
                    const colorClass = isInc ? 'tx-income' : 'tx-expense';
                    
                    html += `
                    <div class="tx-item">
                        <div class="tx-info">
                            <h4>${t.desc}</h4>
                            <p>${t.date}</p>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="tx-amount ${colorClass}">${sign} ${t.amount.toLocaleString('ru-RU')}</div>
                            <button class="tx-delete" onclick="deleteTransaction(${t.id})">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>`;
                });
            }

            list.innerHTML = html;
            document.getElementById('finance-total').innerText = balance.toLocaleString('ru-RU') + " UZS";
        }

        // === SYSTEM SETTINGS ===
        function clearAllData() {
            if(confirm("ВНИМАНИЕ! Это удалит всю финансовую историю, портфель и аватарку. Продолжить?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // === INIT SYSTEM ===
        function init() {
            loadPortfolioInput();
            renderTransactions();
            fetchMarketData();
            // Auto refresh market every 5 mins
            setInterval(fetchMarketData, 300000);
            
            // Calc local storage usage size roughly
            let _lsTotal = 0, _xLen, _x;
            for (_x in localStorage) {
                if (!localStorage.hasOwnProperty(_x)) continue;
                _xLen = ((localStorage[_x].length + _x.length) * 2);
                _lsTotal += _xLen;
            }
            document.getElementById('storage-status').innerText = (_lsTotal / 1024).toFixed(2) + " KB";
        }

        window.onload = init;

    </script>
</body>
</html>
