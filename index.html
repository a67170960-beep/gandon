<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #161621;
            --accent: #b829ea;
            --green: #00ff88;
            --red: #ff3b3b;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 15px;
            padding-bottom: 80px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: 2px solid #fff; }
        
        /* Сетка курсов */
        .rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .rate-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(184, 41, 234, 0.2);
            position: relative;
            overflow: hidden;
        }
        .rate-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(184, 41, 234, 0.1) 0%, transparent 70%);
        }
        .rate-title { font-size: 12px; color: #888; margin-bottom: 5px; }
        .rate-value { font-size: 16px; font-weight: bold; }
        .trend { font-size: 11px; margin-top: 5px; display: flex; align-items: center; gap: 3px; }
        .up { color: var(--green); } .down { color: var(--red); }

        /* Секция парсинга */
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px; color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        .scan-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0f 100%);
            padding: 20px; border-radius: 20px; border: 1px solid var(--accent);
            margin-bottom: 20px;
        }
        input {
            width: 100%; background: #000; border: 1px solid #333;
            padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px;
            box-sizing: border-box; outline: none; font-family: 'Courier New', monospace;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(184, 41, 234, 0.5); }
        button {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 15px rgba(184, 41, 234, 0.4); cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }

        /* Результаты парсинга */
        #results {
            background: var(--card-bg); border-radius: 16px; padding: 15px;
            border: 1px solid #333; display: none;
        }
        .result-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #333;
        }
        .result-item:last-child { border-bottom: none; }
        .item-name { font-size: 14px; color: #ccc; }
        .item-price { font-size: 16px; font-weight: bold; color: var(--accent); }
        .loader { color: var(--green); font-family: 'Courier New', monospace; text-align: center; display: none; margin-top: 10px;}

        /* Нижнее меню */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 22, 33, 0.95);
            display: flex; justify-content: space-around; padding: 15px;
            backdrop-filter: blur(10px); border-top: 1px solid #333; z-index: 10;
        }
        .nav-item { color: #555; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info">
            <div class="avatar"></div>
            <div style="font-weight: bold;">Danil Tushkov</div>
        </div>
        <div style="color: var(--accent); font-weight: bold;">LIVE_NET</div>
    </div>

    <div class="rates-grid" id="rates-container">
        <div class="rate-card"><div class="rate-title">Загрузка...</div></div>
        <div class="rate-card"><div class="rate-title">Загрузка...</div></div>
    </div>

    <div class="section-title">FRAGMENT SCANNER 🛸</div>
    <div class="scan-box">
        <input type="text" id="model" placeholder="Модель (напр. White Rabbit)">
        <input type="text" id="pattern" placeholder="Узор / Фон (напр. Starry)">
        <button onclick="runScanner()" id="scan-btn">ЗАПУСТИТЬ ПОИСК</button>
        <div id="loader" class="loader">> ПОДКЛЮЧЕНИЕ К УЗЛАМ...</div>
    </div>

    <div id="results"></div>

    <div class="nav">
        <div class="nav-item active">📊</div>
        <div class="nav-item">🎁</div>
        <div class="nav-item">💎</div>
        <div class="nav-item">👤</div>
    </div>

    <script>
        // Инициализация Telegram
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Загрузка курсов (UZS, TON, BTC)
        async function loadData() {
            try {
                let cbu = await fetch("https://cbu.uz/ru/arkhiv-kursov-valyut/json/").then(r => r.json());
                let uzs = parseFloat(cbu[0].Rate);

                let cg = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=the-open-network,bitcoin&vs_currencies=usd&include_24hr_change=true").then(r => r.json());
                let ton = cg['the-open-network'];
                let btc = cg.bitcoin;

                const container = document.getElementById('rates-container');
                container.innerHTML = `
                    <div class="rate-card">
                        <div class="rate-title">TON / UZS</div>
                        <div class="rate-value">${Math.floor(ton.usd * uzs).toLocaleString('ru-RU')}</div>
                        <div class="trend ${ton.usd_24h_change >= 0 ? 'up' : 'down'}">
                            ${ton.usd_24h_change >= 0 ? '▲' : '▼'} ${ton.usd_24h_change.toFixed(2)}%
                        </div>
                    </div>
                    <div class="rate-card">
                        <div class="rate-title">BTC / UZS</div>
                        <div class="rate-value">${Math.floor(btc.usd * uzs).toLocaleString('ru-RU')}</div>
                        <div class="trend ${btc.usd_24h_change >= 0 ? 'up' : 'down'}">
                            ${btc.usd_24h_change >= 0 ? '▲' : '▼'} ${btc.usd_24h_change.toFixed(2)}%
                        </div>
                    </div>
                `;
            } catch (e) { console.error("Ошибка загрузки курсов", e); }
        }
        loadData();

        // 2. Парсер Fragment через JS + CORS Proxy
        async function runScanner() {
            const model = document.getElementById('model').value;
            const pattern = document.getElementById('pattern').value;
            const btn = document.getElementById('scan-btn');
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');

            if (!model && !pattern) {
                tg.showAlert("Введите данные для поиска!");
                return;
            }

            // Анимация загрузки
            btn.style.display = "none";
            loader.style.display = "block";
            resultsDiv.style.display = "none";
            resultsDiv.innerHTML = "";

            // Формируем запрос через allorigins proxy, чтобы браузер не ругался
            const query = encodeURIComponent(`${model} ${pattern}`.trim());
            const targetUrl = `https://fragment.com/gifts?query=${query}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // Превращаем текст в HTML (виртуальный DOM)
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");

                // Ищем строки с подарками
                const items = doc.querySelectorAll('tr.tm-row-selectable');
                
                if (items.length === 0) {
                    resultsDiv.innerHTML = "<div style='text-align:center; color:#888;'>Ничего не найдено 🤷‍♂️</div>";
                } else {
                    let htmlList = `<div style="font-size: 12px; color: #00ff88; margin-bottom: 10px;">> НАЙДЕНО ЛОТОВ: ${items.length}</div>`;
                    
                    // Берем первые 5 результатов
                    for (let i = 0; i < Math.min(items.length, 5); i++) {
                        let nameEl = items[i].querySelector('.tm-value');
                        let priceEl = items[i].querySelector('.table-cell-value');
                        
                        let name = nameEl ? nameEl.innerText.trim() : "Неизвестно";
                        let price = priceEl ? priceEl.innerText.trim() : "0";

                        htmlList += `
                            <div class="result-item">
                                <span class="item-name">🎁 ${name}</span>
                                <span class="item-price">💎 ${price}</span>
                            </div>
                        `;
                    }
                    resultsDiv.innerHTML = htmlList;
                }
                resultsDiv.style.display = "block";

            } catch (error) {
                tg.showAlert("Ошибка парсинга. Защита сайта или прокси недоступен.");
                console.error(error);
            } finally {
                // Возвращаем интерфейс обратно
                loader.style.display = "none";
                btn.style.display = "block";
            }
        }
    </script>
</body>
</html>
