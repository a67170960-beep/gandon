<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #161621;
            --accent: #b829ea;
            --green: #00ff88;
            --red: #ff3b3b;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 15px;
            padding-bottom: 80px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: 2px solid #fff; }
        
        /* Сетка курсов */
        .rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .rate-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(184, 41, 234, 0.2);
            position: relative;
            overflow: hidden;
        }
        .rate-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(184, 41, 234, 0.1) 0%, transparent 70%);
        }
        .rate-title { font-size: 12px; color: #888; margin-bottom: 5px; }
        .rate-value { font-size: 16px; font-weight: bold; }
        .trend { font-size: 11px; margin-top: 5px; display: flex; align-items: center; gap: 3px; }
        .up { color: var(--green); } .down { color: var(--red); }

        /* Секция парсинга */
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px; color: var(--accent); }
        .scan-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0f 100%);
            padding: 20px; border-radius: 20px; border: 1px solid var(--accent);
        }
        input {
            width: 100%; background: #000; border: 1px solid #333;
            padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px;
            box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 15px rgba(184, 41, 234, 0.4);
        }

        /* Нижнее меню */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 22, 33, 0.95);
            display: flex; justify-content: space-around; padding: 15px;
            backdrop-filter: blur(10px); border-top: 1px solid #333;
        }
        .nav-item { color: #555; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info">
            <div class="avatar"></div>
            <div style="font-weight: bold;">Danil Tushkov</div>
        </div>
        <div style="color: var(--accent); font-weight: bold;">LIVE</div>
    </div>

    <div class="rates-grid" id="rates-container">
        </div>

    <div class="section-title">Scanner Portal 🛸</div>
    <div class="scan-box">
        <input type="text" id="model" placeholder="Модель (Cyber Lion...)">
        <input type="text" id="pattern" placeholder="Узор / Фон">
        <button onclick="sendData()">ЗАПУСТИТЬ ПОИСК</button>
    </div>

    <div class="nav">
        <div class="nav-item active">📊</div>
        <div class="nav-item">🎁</div>
        <div class="nav-item">💎</div>
        <div class="nav-item">👤</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        async function loadData() {
            try {
                // Курс сума
                let cbu = await fetch("https://cbu.uz/ru/arkhiv-kursov-valyut/json/").then(r => r.json());
                let uzs = parseFloat(cbu[0].Rate);

                // Крипта + % изменения за 24ч
                let cg = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=the-open-network,bitcoin&vs_currencies=usd&include_24hr_change=true").then(r => r.json());
                
                let ton = cg['the-open-network'];
                let btc = cg.bitcoin;

                const container = document.getElementById('rates-container');
                container.innerHTML = `
                    <div class="rate-card">
                        <div class="rate-title">TON / UZS</div>
                        <div class="rate-value">${Math.floor(ton.usd * uzs).toLocaleString()}</div>
                        <div class="trend ${ton.usd_24h_change >= 0 ? 'up' : 'down'}">
                            ${ton.usd_24h_change >= 0 ? '▲' : '▼'} ${ton.usd_24h_change.toFixed(2)}%
                        </div>
                    </div>
                    <div class="rate-card">
                        <div class="rate-title">BTC / UZS</div>
                        <div class="rate-value">${Math.floor(btc.usd * uzs).toLocaleString()}</div>
                        <div class="trend ${btc.usd_24h_change >= 0 ? 'up' : 'down'}">
                            ${btc.usd_24h_change >= 0 ? '▲' : '▼'} ${btc.usd_24h_change.toFixed(2)}%
                        </div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        loadData();

        function sendData() {
            let obj = {
                model: document.getElementById('model').value,
                pattern: document.getElementById('pattern').value
            };
            tg.sendData(JSON.stringify(obj));
            tg.close();
        }
    </script>
</body>
</html>
